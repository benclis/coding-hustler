<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Hustler - Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.agent {
            text-align: left;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .message.agent .message-content {
            background: #e9ecef;
            color: #333;
        }
        
        .timestamp {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .input-area button:hover {
            background: #5568d3;
        }
        
        .input-area button:active {
            transform: scale(0.98);
        }
        
        .status {
            font-size: 12px;
            color: #666;
            text-align: center;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Coding Hustler Agent</h1>
            <p>Chat ile video production otomasyonu</p>
        </div>
        
        <div class="chat-box" id="chatBox"></div>
        
        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Serbest çalışma, script, thumbnail, upload... yazabilirsin"
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        const chatBox = document.getElementById("chatBox");
        const messageInput = document.getElementById("messageInput");
        
        let conversationHistory = [];
        
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            
            // Add user message to UI
            addMessage(content, "user");
            messageInput.value = "";
            
            // Show loading
            const loadingId = "loading_" + Date.now();
            addMessage("Processing...", "agent", loadingId);
            
            try {
                // Send to backend
                const response = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        content: content,
                        role: "user"
                    })
                });
                
                const data = await response.json();
                
                // Remove loading message
                removeMessage(loadingId);
                
                // Add agent response
                addMessage(data.message, "agent");
                
                // Store in history
                conversationHistory.push({
                    user: content,
                    agent: data.message,
                    pipeline_id: data.pipeline_id,
                    timestamp: new Date().toISOString()
                });
                
            } catch (error) {
                removeMessage(loadingId);
                addMessage(`Error: ${error.message}`, "agent");
            }
        }
        
        function addMessage(content, role, id = null) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${role}`;
            if (id) messageDiv.id = id;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = content;
            
            const timestampDiv = document.createElement("div");
            timestampDiv.className = "timestamp";
            timestampDiv.textContent = new Date().toLocaleTimeString("tr-TR");
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timestampDiv);
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }
        
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
        
        // Welcome message
        window.addEventListener("load", () => {
            addMessage(
                "👋 Merhaba! Ben Coding Hustler Agent'iyim.\n\n" +
                "Şunları yapabilirim:\n" +
                "1️⃣ 'serbest çalışma' → Freelance guide + video prep\n" +
                "2️⃣ 'script yaz' → Video script generation\n" +
                "3️⃣ 'thumbnail tasarla' → Thumbnail design\n" +
                "4️⃣ 'youtube'a yükle' → Upload preparation\n\n" +
                "Ne istiyorsun? 🤔",
                "agent"
            );
        });
    </script>
</body>
</html>
